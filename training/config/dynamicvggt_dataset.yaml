# Shared dataset settings for DynamicVGGT multiview + temporal training.
data:
  common_config:
    multiview_and_temporal: true
    fix_img_num: -1
    fix_aspect_ratio: 1.0
    load_track: false
    track_num: 1024
    training: true
    inside_random: true
    img_size: ${img_size}
    patch_size: ${patch_size}
    rescale: true
    rescale_aug: true
    landscape_check: false
    debug: false
    get_nearby: true
    load_depth: true
    img_nums: [2, 8]
    max_img_per_gpu: ${max_img_per_gpu}
    allow_duplicate_img: true
    repeat_batch: false
    augs:
      cojitter: true
      cojitter_ratio: 0.3
      scales: [0.8, 1.2]
      aspects: [0.33, 1.0]
      color_jitter:
        brightness: 0.5
        contrast: 0.5
        saturation: 0.5
        hue: 0.1
        p: 0.9
      gray_scale: true
      gau_blur: false
