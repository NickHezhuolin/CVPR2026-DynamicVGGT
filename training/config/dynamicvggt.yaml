# DynamicVGGT training configuration.
# Usage (from training/):
#   torchrun --nproc_per_node=N launch.py --config dynamicvggt

defaults:
  - dynamicvggt_dataset

exp_name: dynamicvggt_exp001
img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 2
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 8
is_multiframe: true
scale_by_points: true

limit_train_batches: 800
limit_val_batches: 400

logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_total
        - loss_camera
        - loss_conf1_depth
        - loss_reg1_depth
        - loss_grad1_depth
        - loss_conf2_depth
        - loss_reg2_depth
        - loss_grad2_depth
        - loss_conf_future_point
        - loss_reg_future_point
        - loss_grad_future_point
    val:
      keys_to_log:
        - loss_total
        - loss_camera
        - loss_conf1_depth
        - loss_reg1_depth
        - loss_grad1_depth

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  load_pretrained_path: null  # optional user-provided init checkpoint
  resume_checkpoint_path: null
  strict: False

loss:
  _target_: loss.MultitaskLoss
  is_multiframe: true
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point: null
  future_point:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  track: null

optim:
  param_group_modifiers: False
  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05
  frozen_module_names: []
  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["future_point"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 20

model:
  _target_: dynamicvggt.models.dynamicvggt.DynamicVGGT
  img_size: ${img_size}
  patch_size: ${patch_size}
  enable_camera: true
  enable_depth: true
  enable_point: true
  enable_gs: false
  enable_future_point: true
  patch_embed: dinov2_vitl14_reg
  load_dino_path: null
  freeze_vggt: false
  enable_motion_tokens: true
  use_camera_enc: false

distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: true
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True

data:
  train_own_dataset:
    _target_: data.multi_dynamic_dataloader.MultiDatasetDynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config: ${data.common_config}
    dataset:
      _target_: data.multi_composed_dataset.MultiComposedDataset
      dataset_configs: []  # add your multiview-temporal dataset classes here
  val: null
